<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#111827" />
  <title>Risiko-Karten</title>
  <style>
    :root {
      --bg1: #111827;
      --bg2: #4c1d95;
      --accent: #facc15;
      --accent-dark: #ca8a04;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --green: #16a34a;
      --red: #dc2626;
      --blue: #2563eb;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(250,204,21,.2), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      color: white;
      display: flex;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
    }

    .app {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .top {
      text-align: center;
      padding-top: 6px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: -0.8px;
    }

    .subtitle {
      margin-top: 6px;
      opacity: .85;
      font-size: 15px;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .team {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 18px;
      padding: 12px;
      backdrop-filter: blur(10px);
    }

    .team label {
      display: block;
      font-weight: 800;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .team-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .points {
      font-size: 30px;
      font-weight: 900;
      min-width: 54px;
      text-align: center;
    }

    .small-btn {
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 12px;
      font-size: 21px;
      font-weight: 900;
      background: rgba(255,255,255,.9);
      color: var(--text);
      cursor: pointer;
    }

    .card-wrap {
      perspective: 1000px;
      min-height: 305px;
    }

    .card {
      position: relative;
      width: 100%;
      min-height: 305px;
      transform-style: preserve-3d;
      transition: transform .65s cubic-bezier(.2,.8,.2,1);
    }

    .card.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      inset: 0;
      background: var(--card);
      color: var(--text);
      border-radius: 30px;
      box-shadow: 0 24px 50px rgba(0,0,0,.38);
      padding: 26px 22px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .front {
      background: linear-gradient(160deg, #facc15, #fb923c);
      color: #111827;
    }

    .front .dice {
      font-size: 84px;
      filter: drop-shadow(0 10px 12px rgba(0,0,0,.18));
    }

    .front .front-title {
      font-size: 30px;
      font-weight: 950;
      margin-top: 10px;
    }

    .back { transform: rotateY(180deg); }

    .category {
      font-size: 17px;
      font-weight: 900;
      color: #6d28d9;
      margin-bottom: 18px;
    }

    .text {
      font-size: 25px;
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: -0.3px;
    }

    .note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .actions {
      display: grid;
      gap: 10px;
    }

    .main-btn, .secondary-btn, .coin-btn {
      width: 100%;
      border: none;
      border-radius: 20px;
      padding: 18px 16px;
      font-size: 22px;
      font-weight: 950;
      cursor: pointer;
    }

    .main-btn {
      background: var(--accent);
      color: var(--text);
      box-shadow: 0 8px 0 var(--accent-dark);
    }

    .main-btn:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 var(--accent-dark);
    }

    .secondary-btn, .coin-btn {
      background: rgba(255,255,255,.15);
      color: white;
      border: 1px solid rgba(255,255,255,.22);
    }

    .coin-result {
      display: none;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 18px;
      padding: 16px;
      text-align: center;
      font-size: 22px;
      font-weight: 950;
    }

    .status {
      text-align: center;
      font-size: 14px;
      opacity: .85;
      min-height: 20px;
    }

    .danger {
      background: rgba(220,38,38,.18);
      border: 1px solid rgba(248,113,113,.35);
    }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 20;
    }

    .modal {
      width: 100%;
      max-width: 430px;
      background: white;
      color: var(--text);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      text-align: center;
    }

    .modal h2 { margin: 0 0 8px; }
    .modal p { margin: 0 0 18px; color: var(--muted); }

    .modal button {
      border: none;
      border-radius: 14px;
      padding: 13px 16px;
      font-weight: 900;
      font-size: 16px;
      margin: 4px;
      cursor: pointer;
    }

    .yes { background: var(--red); color: white; }
    .no { background: #e5e7eb; color: var(--text); }
  </style>
</head>
<body>
  <main class="app">
    <section class="top">
      <h1>🎲 Risiko-Karten</h1>
      <div class="subtitle">Ziehen, flippen, lachen, Punkte kassieren.</div>
    </section>

    <section class="scoreboard">
      <div class="team">
        <label>Team A</label>
        <div class="team-row">
          <button class="small-btn" onclick="changeScore('A', -1)">−</button>
          <div id="scoreA" class="points">0</div>
          <button class="small-btn" onclick="changeScore('A', 1)">+</button>
        </div>
      </div>
      <div class="team">
        <label>Team B</label>
        <div class="team-row">
          <button class="small-btn" onclick="changeScore('B', -1)">−</button>
          <div id="scoreB" class="points">0</div>
          <button class="small-btn" onclick="changeScore('B', 1)">+</button>
        </div>
      </div>
    </section>

    <section class="card-wrap">
      <div id="card" class="card">
        <div class="face front">
          <div class="dice">🎴</div>
          <div class="front-title">Bereit?</div>
          <div class="note">Tippe unten auf «Risiko-Karte ziehen».</div>
        </div>
        <div class="face back">
          <div id="category" class="category">Kategorie</div>
          <div id="text" class="text">Karte erscheint hier.</div>
          <div id="note" class="note">Jede gezogene Karte gilt sofort.</div>
        </div>
      </div>
    </section>

    <section class="actions">
      <button class="main-btn" onclick="drawCard()">Risiko-Karte ziehen</button>
      <button id="coinBtn" class="coin-btn" onclick="flipCoin()" style="display:none;">🪙 Münze werfen</button>
      <div id="coinResult" class="coin-result"></div>
      <button class="secondary-btn danger" onclick="openReset()">Spiel zurücksetzen</button>
    </section>

    <div id="status" class="status">Noch 16 Karten im Stapel.</div>
  </main>

  <div id="modalBg" class="modal-bg">
    <div class="modal">
      <h2>Spiel zurücksetzen?</h2>
      <p>Punkte und Kartenstapel werden gelöscht.</p>
      <button class="yes" onclick="resetGame()">Ja, zurücksetzen</button>
      <button class="no" onclick="closeReset()">Abbrechen</button>
    </div>
  </div>

  <script>
    const allCards = [
      { category: "🎲 Glück oder Pech", text: "🎁 Jackpot: +15 Punkte", coin: false },
      { category: "🎲 Glück oder Pech", text: "💥 Pech gehabt: -10 Punkte", coin: false },
      { category: "🎲 Glück oder Pech", text: "🎯 50:50: Münze werfen → +20 Punkte oder -10 Punkte", coin: true, heads: "+20 Punkte!", tails: "-10 Punkte!" },
      { category: "🎲 Glück oder Pech", text: "☠️ Alles oder Nichts: Münze werfen → Verdoppelt euren aktuellen Punktestand oder verliert 50 % davon.", coin: true, heads: "Verdoppeln!", tails: "50 % verlieren!" },

      { category: "🚀 Challenge-Booster", text: "🚀 Nächste Challenge zählt dreifach.", coin: false },
      { category: "🚀 Challenge-Booster", text: "⚡ Nächste zwei Challenges zählen doppelt.", coin: false },
      { category: "🚀 Challenge-Booster", text: "🎯 Die höchste Challenge der nächsten 15 Minuten zählt doppelt.", coin: false },

      { category: "🦹 Sabotage", text: "🦹 Ihr klaut einem anderen Team 5 Punkte.", coin: false },
      { category: "🦹 Sabotage", text: "💣 Ein anderes Team verliert 5 Punkte.", coin: false },

      { category: "🙈 Mutprobe", text: "🙈 Die nächste Challenge muss ohne Sprechen erledigt werden.", coin: false },
      { category: "🙈 Mutprobe", text: "🐧 Das Team bewegt sich während 2 Minuten nur auf einem Bein.", coin: false },

      { category: "⏳ Zeitdruck", text: "⏳ Erledigt innerhalb von 5 Minuten eine 8-Punkte-Challenge oder mehr → +10 Bonuspunkte.", coin: false },
      { category: "⏳ Zeitdruck", text: "⚡ Erledigt die nächste Challenge innerhalb von 2 Minuten → doppelte Punkte.", coin: false },
      { category: "⏳ Zeitdruck", text: "🚨 Innerhalb von 10 Minuten müssen drei Challenges geschafft werden → +10 Punkte.", coin: false },

      { category: "🧨 Chaos-Karte", text: "🧨 Löscht die Punkte eurer letzten Challenge oder verdoppelt sie. Münzwurf entscheidet.", coin: true, heads: "Letzte Challenge verdoppeln!", tails: "Letzte Challenge löschen!" },
      { category: "🧨 Chaos-Karte", text: "🤯 Für die nächsten 10 Minuten muss jedes Teammitglied einen erfundenen Namen verwenden.", coin: false }
    ];

    let deck = [];
    let currentCard = null;
    let scores = { A: 0, B: 0 };

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function init() {
      const savedScores = localStorage.getItem("riskScores");
      const savedDeck = localStorage.getItem("riskDeck");

      if (savedScores) scores = JSON.parse(savedScores);
      if (savedDeck) deck = JSON.parse(savedDeck);
      if (!deck || deck.length === 0) deck = shuffle(allCards);

      updateScores();
      updateStatus();
    }

    function drawCard() {
      const cardEl = document.getElementById("card");
      const coinResult = document.getElementById("coinResult");
      const coinBtn = document.getElementById("coinBtn");

      coinResult.style.display = "none";
      coinResult.textContent = "";
      coinBtn.style.display = "none";

      cardEl.classList.remove("flipped");

      setTimeout(() => {
        if (deck.length === 0) deck = shuffle(allCards);
        currentCard = deck.pop();

        document.getElementById("category").textContent = currentCard.category;
        document.getElementById("text").textContent = currentCard.text;
        document.getElementById("note").textContent = currentCard.coin ? "Münzwurf direkt hier ausführen." : "Diese Karte gilt sofort.";

        localStorage.setItem("riskDeck", JSON.stringify(deck));
        updateStatus();

        cardEl.classList.add("flipped");
        if (currentCard.coin) coinBtn.style.display = "block";
      }, 250);
    }

    function flipCoin() {
      if (!currentCard || !currentCard.coin) return;
      const result = Math.random() < 0.5 ? currentCard.heads : currentCard.tails;
      const coinResult = document.getElementById("coinResult");
      coinResult.textContent = "🪙 " + result;
      coinResult.style.display = "block";
    }

    function changeScore(team, amount) {
      scores[team] += amount;
      updateScores();
      localStorage.setItem("riskScores", JSON.stringify(scores));
    }

    function updateScores() {
      document.getElementById("scoreA").textContent = scores.A;
      document.getElementById("scoreB").textContent = scores.B;
    }

    function updateStatus() {
      const text = deck.length === 0
        ? "Alle Karten gezogen. Beim nächsten Ziehen wird neu gemischt."
        : `Noch ${deck.length} Karten im Stapel.`;
      document.getElementById("status").textContent = text;
    }

    function openReset() {
      document.getElementById("modalBg").style.display = "flex";
    }

    function closeReset() {
      document.getElementById("modalBg").style.display = "none";
    }

    function resetGame() {
      scores = { A: 0, B: 0 };
      deck = shuffle(allCards);
      currentCard = null;
      localStorage.setItem("riskScores", JSON.stringify(scores));
      localStorage.setItem("riskDeck", JSON.stringify(deck));
      updateScores();
      updateStatus();
      closeReset();
      document.getElementById("card").classList.remove("flipped");
      document.getElementById("coinBtn").style.display = "none";
      document.getElementById("coinResult").style.display = "none";
    }

    init();
  </script>
</body>
</html>
